name: PharmaSearch
options:
  bundleIdPrefix: rs.aposteka
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  PharmaSearch:
    type: application
    platform: iOS
    sources:
      - path: PharmaSearch
        excludes:
          - Assets.xcassets
    resources:
      - PharmaSearch/ApostekaLogo.png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rs.aposteka.PharmaSearch
        INFOPLIST_FILE: PharmaSearch/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  PharmaSearch:
    build:
      targets:
        PharmaSearch: all
    run:
      config: Debug
